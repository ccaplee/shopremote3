name: Build Host-Only Variant

on:
  workflow_dispatch:
    inputs:
      upload-tag:
        description: 'Upload tag name'
        required: false
        default: 'nightly'

permissions:
  contents: write

env:
  RUST_VERSION: "1.75"
  MAC_RUST_VERSION: "1.81"
  FLUTTER_VERSION: "3.24.5"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "2.0.1"
  TAG_NAME: "${{ inputs.upload-tag }}"
  UPLOAD_ARTIFACT: true

jobs:
  generate-bridge:
    uses: ./.github/workflows/bridge.yml

  build-host-windows:
    name: Build host-only for Windows
    needs: generate-bridge
    runs-on: windows-2022
    strategy:
      fail-fast: false
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifacts
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Build host-only variant
        run: |
          python3 build.py --flutter --host-only

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: shopremote2-host-windows
          path: shopremote2-host-*.exe

  build-host-macos:
    name: Build host-only for macOS
    needs: generate-bridge
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-apple-darwin, os: macos-12, arch: x86_64 }
          - { target: aarch64-apple-darwin, os: macos-14, arch: aarch64 }
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifacts
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MAC_RUST_VERSION }}
          targets: ${{ matrix.job.target }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Build host-only variant
        run: |
          python3 build.py --flutter --host-only

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: shopremote2-host-macos-${{ matrix.job.arch }}
          path: shopremote2-host-*.dmg

  build-host-linux:
    name: Build host-only for Linux
    needs: generate-bridge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v6
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore bridge files
        uses: actions/download-artifact@master
        with:
          name: bridge-artifacts
          path: ./

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-randr0-dev libxdo-dev libxfixes-dev libxcb-shape0-dev libxcb-xfixes0-dev libxfixes-dev libasound2-dev libsystemd-dev libva-dev libva-drm2 libva-x11-2 libgstreamer-plugins-base1.0-0 libpam0g libgstreamer1.0-0 libpam0g-dev

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Build host-only variant
        run: |
          python3 build.py --flutter --host-only

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: shopremote2-host-linux-x86_64
          path: shopremote2-host-*.deb

  release:
    name: Create Release
    needs: [build-host-windows, build-host-macos, build-host-linux]
    runs-on: ubuntu-latest
    if: ${{ env.UPLOAD_ARTIFACT == 'true' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
