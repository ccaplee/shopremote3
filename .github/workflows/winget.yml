name: Publish to WinGet
on:
  release:
    types: [released]
  workflow_dispatch:
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: ShopRemote2.ShopRemote2
          version: "2.0.1"
          release-tag: "2.0.1"
          token: ${{ secrets.WINGET_TOKEN }}
